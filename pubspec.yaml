name: visor_topologico
description: Aplicación para visualización de laberintos mediante Bluetooth SPP.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Dependencia para el socket serie con el ESP32
  flutter_bluetooth_serial: ^0.4.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  # Si en el futuro necesitas cargar sonidos o imágenes estáticas:
  # assets:
  #   - assets/images/robot_icon.png
